    php:
        build:
            context: .
            dockerfile: PHP.Dockerfile
        volumes:
            - ./app:/app
            - ./ca.pem:/etc/ssl/certs/aiven-ca.pem:ro
        environment:
            DB_HOST: ${AIVEN_HOST}
            DB_PORT: ${AIVEN_PORT}
            DB_DATABASE: ${AIVEN_DB}
            DB_USERNAME: ${AIVEN_USER}
            DB_PASSWORD: ${AIVEN_PASSWORD}
            DB_SSL_CA: /etc/ssl/certs/aiven-ca.pem

    stripe-cli:
        image: stripe/stripe-cli
        entrypoint: /bin/sh
        command: -c "stripe listen --api-key $$STRIPE_SECRET_KEY --forward-to http://nginx/stripe/webhook"
        env_file:
            - ./app/.env
        depends_on:
            - nginx
        restart: on-failure

    phpmyadmin:
        image: phpmyadmin:latest
        ports:
            - "8080:80"
        env_file:
            - ./app/.env
        environment:
            PMA_HOST: ${AIVEN_HOST}
            PMA_PORT: ${AIVEN_PORT}
            PMA_USER: ${AIVEN_USER}
            PMA_PASSWORD: ${AIVEN_PASSWORD}
            PMA_SSL: "true"
            PMA_SSL_CA: /etc/ssl/certs/aiven-ca.pem
        volumes:
            - ./ca.pem:/etc/ssl/certs/aiven-ca.pem:ro
        restart: unless-stopped

    cron:
      build:
        context: .
        dockerfile: Cron.Dockerfile
      volumes:
        - ./app:/app
        - /var/run/docker.sock:/var/run/docker.sock